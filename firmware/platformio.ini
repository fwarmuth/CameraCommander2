; CameraCommander2 firmware build configuration.
; Primary target: ESP8266 (NodeMCU v2/v3). ESP32 enabled as a secondary env.
; Native env exists for parser unit tests (no MCU required).

[platformio]
default_envs = nodemcuv2

[env]
framework      = arduino
monitor_speed  = 9600
upload_speed   = 115200
build_unflags  = -std=gnu++11
build_flags    = -std=gnu++17 -Wall -Wextra
lib_deps       = waspinator/AccelStepper@^1.64

[env:nodemcuv2]
platform = espressif8266
board    = nodemcuv2

[env:esp32]
platform = espressif32
board    = esp32dev

[env:native]
platform = native
build_flags = -std=gnu++17 -Wall -Wextra
test_framework = unity
build_src_filter = -<*> +<safety.cpp>
