metadata:
  name: "Mock video pan"
  tags: ["mock", "quickstart"]
camera: {}
tripod:
  serial:
    port: "socket://127.0.0.1:9999"
safety:
  tilt_min_deg: -45.0
  tilt_max_deg: 45.0
  move_timeout_margin_s: 1.0
  disk_min_free_bytes: 0
  disk_avg_frame_bytes: 1
output:
  output_dir: "./output/mock-video-pan"
sequence:
  kind: video_pan
  duration_s: 2.0
  start: { pan_deg: 0.0, tilt_deg: 0.0 }
  target: { pan_deg: 15.0, tilt_deg: 3.0 }
