metadata:
  name: "Mock Timelapse"
camera:
  model_substring: "MOCK"
tripod:
  serial:
    port: "socket://127.0.0.1:9999"
safety:
  tilt_min_deg: -45
  tilt_max_deg: 45
output:
  output_dir: "./output"
sequence:
  kind: "timelapse"
  total_frames: 10
  interval_s: 1.0
  settle_time_s: 0.0
  start: { pan_deg: 0, tilt_deg: 0 }
  target: { pan_deg: 10, tilt_deg: 0 }
