metadata:
  name: "rig-test"
tripod:
  serial:
    port: "/dev/ttyUSB0"
camera:
  model_substring: "MOCK"
safety:
  tilt_min_deg: -45
  tilt_max_deg: 45
output:
  output_dir: "./output"
sequence:
  kind: "timelapse"
  total_frames: 2
  interval_s: 1
  settle_time_s: 0
  start: { pan_deg: 0, tilt_deg: 0 }
  target: { pan_deg: 0, tilt_deg: 0 }
