target-version = "py312"
line-length = 100

extend-exclude = [
    ".venv",
    "build",
    "dist",
]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "C4",   # flake8-comprehensions
    "RET",  # flake8-return
    "PT",   # pytest-style
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # FastAPI Depends() in defaults
]

[lint.per-file-ignores]
"tests/**" = ["B011", "PT011"]

[format]
quote-style = "double"
indent-style = "space"
